when:
  - event: ["push", "manual"]
    branch: ["**"]
  - event: ["pull_request"]
    branch: ["**"]

engine: "nixery"

dependencies:
  nixpkgs/nixpkgs-unstable:
    - git
    - gnused
    - nodejs

steps:
  - name: "Install dependencies"
    command: "npm install --prefix .ci-tools --no-save pnpm@10.32.1 && node .ci-tools/node_modules/pnpm/bin/pnpm.cjs install --frozen-lockfile --store-dir .pnpm-store"

  - name: "Check formatting"
    command: "node .ci-tools/node_modules/pnpm/bin/pnpm.cjs format:check"

  - name: "Typecheck"
    command: "node .ci-tools/node_modules/pnpm/bin/pnpm.cjs typecheck"

  - name: "Build"
    command: "node .ci-tools/node_modules/pnpm/bin/pnpm.cjs build"
